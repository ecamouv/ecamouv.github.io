<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Enrique Camou Villa — Portfolio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;
  --surface:#f5f5f5;
  --surface2:#ececec;
  --border:#d8d8d8;
  --border2:#b0b0b0;
  --accent:#000000;
  --ember:#d95a2b;
  --ash:#555555;
  --smoke:#888888;
  --white:#000000;
}
html,body{height:100%}
body{background:var(--bg);color:var(--white);font-family:-apple-system,system-ui,'Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}

/* LAYOUT */
main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:3rem}

/* IDENTITY */
.identity{margin-bottom:4rem;animation:up 0.8s ease both}
.page-label{font-family:system-ui,sans-serif;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:1.1rem;display:flex;align-items:center;gap:10px}
.page-label::before{content:'';display:block;width:24px;height:1px;background:var(--accent)}
.name{font-size:clamp(3rem,7vw,6rem);font-weight:900;line-height:0.92;letter-spacing:-0.04em;margin-bottom:1.1rem}
.tagline{font-size:1rem;font-family:system-ui,sans-serif;letter-spacing:0.14em;text-transform:uppercase;font-weight:800}

/* DOORS */
.doors{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:780px;animation:up 0.8s 0.2s ease both}
.door{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:2rem 2rem 1.75rem;text-decoration:none;display:block;transition:border-color 0.35s,transform 0.35s}
.door::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(217,90,43,0.08) 0%,transparent 65%);opacity:0;transition:opacity 0.35s}
.door:hover{border-color:var(--ember);transform:translateY(-4px)}
.door:hover::before{opacity:1}

.door-number{font-family:system-ui,sans-serif;font-size:0.65rem;letter-spacing:0.16em;color:var(--border2);margin-bottom:1.5rem;display:block;transition:color 0.3s}
.door:hover .door-number{color:var(--ember)}

.door-title{font-size:1.6rem;font-weight:900;letter-spacing:-0.02em;color:var(--white);line-height:1.1;margin-bottom:0.5rem}
.door-sub{font-size:0.78rem;font-family:system-ui,sans-serif;letter-spacing:0.08em;color:var(--smoke);line-height:1.5;margin-bottom:1.75rem}

.door-enter{display:inline-flex;align-items:center;gap:8px;font-size:0.78rem;font-weight:500;letter-spacing:0.06em;color:var(--ash);transition:color 0.3s,gap 0.3s}
.door:hover .door-enter{color:var(--ember);gap:12px}

/* FOOTER */
footer{position:relative;z-index:1;padding:1.5rem 3rem;font-family:system-ui,sans-serif;font-size:0.68rem;letter-spacing:0.1em;color:var(--smoke);display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
footer a{color:var(--smoke);text-decoration:none;transition:color 0.2s}
footer a:hover{color:var(--ember)}

@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  main{padding:2rem 1.25rem;padding-top:5rem}
  .doors{grid-template-columns:1fr}
  footer{padding:1.5rem 1.25rem}
}
</style>
</head>
<body>

<main>
  <div class="identity">
    <div class="page-label">Portfolio</div>
    <h1 class="name">Enrique Camou Villa<br></h1>
    <p class="tagline">Choose a portfolio</p>
  </div>

  <div class="doors">
    <a href="film/portfolio.html" class="door">
      <span class="door-number">01 &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;</span>
      <div class="door-title">Video &amp;<br>Photography</div>
      <div class="door-sub">Creative Content Portfolio</div>
      <div class="door-enter">Enter <span>&#x2192;</span></div>
    </a>

    <a href="code/portfolio.html" class="door">
      <span class="door-number">02 &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;</span>
      <div class="door-title">Coding</div>
      <div class="door-sub">Junior Full Stack &middot; Frontend</div>
      <div class="door-enter">Enter <span>&#x2192;</span></div>
    </a>
  </div>
</main>

<footer>
  <span>&copy; 2026 Enrique Camou Villa</span>
  <a href="contact.html">Contact</a>
</footer>

</body>
</html>
