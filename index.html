<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Enrique Camou Villa Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0b0a;
  --surface:#161210;
  --border:#2e2320;
  --border2:#3d2f2a;
  --ember:#d95a2b;
  --ember-glow:#ff7043;
  --ash:#9e8880;
  --smoke:#6b5a54;
  --white:#f5ede8;
  --charcoal:#2a1f1b;
}
html,body{height:100%}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;min-height:100vh;overflow-x:hidden}
.noise{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.35}
.ember-wash{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 55% 55% at 15% 90%,rgba(185,66,26,0.16) 0%,transparent 65%),radial-gradient(ellipse 35% 45% at 85% 10%,rgba(100,40,20,0.1) 0%,transparent 60%)}
.wrap{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:3rem}
.identity{display:flex;flex-direction:column;align-items:flex-start;margin-bottom:4rem;animation:up 0.8s ease both}
.mono-tag{font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--ember);margin-bottom:1.1rem;display:flex;align-items:center;gap:10px}
.mono-tag::before{content:'';display:block;width:24px;height:1px;background:var(--ember)}
.name{font-family:'Playfair Display',serif;font-size:clamp(3rem,7vw,6rem);font-weight:900;line-height:0.92;letter-spacing:-0.04em;margin-bottom:1.1rem}
.name em{font-style:italic;color:var(--ash);font-weight:700}
.tagline{font-size:1rem;color:var(--smoke);font-weight:300;letter-spacing:0.01em;max-width:420px;line-height:1.6}
.doors{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:780px;animation:up 0.8s 0.2s ease both}
.door{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:2rem 2rem 1.75rem;text-decoration:none;display:block;transition:border-color 0.35s,transform 0.35s}
.door::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(217,90,43,0.06) 0%,transparent 60%);opacity:0;transition:opacity 0.35s}
.door:hover{border-color:var(--ember);transform:translateY(-4px)}
.door:hover::before{opacity:1}
.door-number{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.16em;color:var(--border2);margin-bottom:1.5rem;display:block;transition:color 0.3s}
.door:hover .door-number{color:var(--ember)}
.door-title{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;letter-spacing:-0.02em;color:var(--white);line-height:1.1;margin-bottom:0.5rem}
.door-sub{font-size:0.8rem;color:var(--smoke);font-family:'DM Mono',monospace;letter-spacing:0.08em;line-height:1.5;margin-bottom:1.75rem}
.door-enter{padding-bottom: 20%;display:inline-flex;align-items:center;gap:8px;font-size:0.78rem;font-weight:500;letter-spacing:0.06em;color:var(--ash);transition:color 0.3s,gap 0.3s}
.door:hover .door-enter{color:var(--ember);gap:12px}
.door-texture{position:absolute;right:-10px;bottom:-16px;font-family:'Playfair Display',serif;font-size:6rem;font-weight:900;font-style:italic;color:rgba(255,255,255,0.02);line-height:1;pointer-events:none;user-select:none;transition:color 0.35s}
.door:hover .door-texture{color:rgba(217,90,43,0.05)}
.footer-line{position:relative;z-index:1;padding:1.5rem 3rem;font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;color:var(--smoke);display:flex;justify-content:space-between;align-items:center}
.footer-line a{color:var(--smoke);text-decoration:none;transition:color 0.2s}
.footer-line a:hover{color:var(--ember)}
@keyframes up{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  .wrap{padding:2rem 1.25rem;padding-top:5rem}
  .doors{grid-template-columns:1fr}
  .footer-line{padding:1.5rem 1.25rem}
}
</style>
</head>
<body>

<div class="noise"></div>
<div class="ember-wash"></div>

<main class="wrap">
  <div class="identity">
    <div class="mono-tag">Portfolio</div>
    <h1 class="name">Enrique Camou Villa<br><em></em></h1>
    <p class="tagline">
      Video editor &amp; photographer. <br>Software engineer.
    </p>
  </div>

  <div class="doors">

    <a href="film/index.html/portfolio.html" class="door">
      <span class="door-number">01 &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;</span>
      <div class="door-title">Video  &amp;<br>Photography</div>
      <div class="door-sub">
        Commercial &middot;
        Editorial &middot; Portrait
      </div>
      <div class="door-enter">Enter <span>&#x2192;</span></div>
    </a>
    <a href="code/index.html/portfolio.html" class="door">
      <span class="door-number">02 &mdash;&mdash;&mdash;&mdash;&mdash;&mdash;</span>
      <div class="door-title">Coding</div>
      <div class="door-sub">
        Systems &middot; Tools &middot; APIs<br>
        Open Source &middot; Writing
      </div>
      <div class="door-enter">Enter <span>&#x2192;</span></div>
    </a>

  </div>
</main>

<footer class="footer-line">
  <span>&copy; 2026</span>
  <a href="contact.html">Contact</a>
</footer>

</body>
</html>
