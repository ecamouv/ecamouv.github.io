<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Test Page</title>
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            padding: 2rem;
            border: 1px solid #1e293b;
            border-radius: 12px;
            background: #1e293b;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: var(--accent);
            font-size: 2.5rem;
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
        }

        .btn {
            background-color: var(--accent);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        #status {
            margin-top: 20px;
            font-style: italic;
            color: #4ade80;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Hello, GitHub Pages!</h1>
        <p>This is a test deployment for my coding portfolio.</p>
        <button class="btn" onclick="testFunction()">Click Me</button>
        <div id="status"></div>
    </div>

    <script>
        function testFunction() {
            const status = document.getElementById('status');
            status.innerText = "JavaScript is working! 🚀";
            console.log("Portfolio test successful.");
        }
    </script>
</body>

</html>
